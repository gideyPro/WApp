name: wavemart
description: WaveMart - Ethiopia's Premier Real Estate Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # State Management
  flutter_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4

  # Navigation
  go_router: ^13.0.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^6.1.5

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Forms & Validation
  formz: ^0.7.0

  # Utilities
  intl: ^0.20.2
  kenat: ^1.0.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  image_cropper: ^12.2.1
  path_provider: ^2.1.2

  # Device Features
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1
  flutter_native_splash: ^2.4.0

  # Video Player
  cached_video_player_plus: ^4.1.0
  video_player: ^2.10.0
  flutter_cache_manager: ^3.4.1
  chewie: ^1.7.4

  # Icons
  cupertino_icons: ^1.0.6
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^20.1.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 400
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 500
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 600
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 700
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 800
        - asset: assets/fonts/montserrat/Montserrat-Variable.ttf
          weight: 900
    - family: Cinzel
      fonts:
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 400
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 500
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 600
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 700
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 800
        - asset: assets/fonts/cinzel/Cinzel-Variable.ttf
          weight: 900
